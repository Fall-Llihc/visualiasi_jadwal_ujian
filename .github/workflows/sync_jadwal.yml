name: Sync Jadwal dari SharePoint

on:
  schedule:
    - cron: '0 * * * *'   # tiap jam — ubah sesuai kebutuhan

  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan sync manual'
        required: false
        default: 'Manual sync dari admin'

  push:
    branches: [ main ]
    paths:
      - '.github/workflows/sync_jadwal.yml'
      - 'scripts/fetch_jadwal.py'
      - 'scripts/generate_data_js.py'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      # Step 1: Download file dari SharePoint → data/jadwal.csv
      - name: Download jadwal dari SharePoint
        run: python scripts/fetch_jadwal.py
        env:
          SHAREPOINT_URL: ${{ secrets.SHAREPOINT_URL }}

      # Step 2: Konversi CSV → docs/data.js untuk GitHub Pages
      - name: Generate data.js untuk frontend
        run: python scripts/generate_data_js.py

      # Step 3: Commit semua hasil
      - name: Commit hasil sync
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Force-add agar tidak diblokir .gitignore
          git add -f data/jadwal.csv data/last_updated.txt docs/data.js
          git diff --staged --quiet || git commit -m "chore: sync jadwal $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
