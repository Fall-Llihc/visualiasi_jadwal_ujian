name: Sync Jadwal dari SharePoint

on:
  # ── Jadwal otomatis — default tiap 1 jam ──────────────────────────────────
  # Ganti angka pertama (0) ke menit yang diinginkan, misal */30 = tiap 30 menit
  # Catatan: GitHub Actions minimum interval = 5 menit
  schedule:
    - cron: '0 * * * *'   # tiap jam tepat (ubah sesuai kebutuhan)

  # ── Trigger manual dari GitHub UI atau via API (untuk tombol admin) ────────
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan sync manual'
        required: false
        default: 'Manual sync dari admin'

  # ── Trigger otomatis saat ada push ke main ────────────────────────────────
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/sync_jadwal.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # perlu untuk commit ke repo

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 2. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install dependencies
      - name: Install dependencies
        run: pip install requests pandas openpyxl

      # 4. Download + parse file dari SharePoint
      - name: Download dan parse file jadwal
        run: python scripts/fetch_jadwal.py
        env:
          SHAREPOINT_URL: ${{ secrets.SHAREPOINT_URL }}

      # 5. Commit file CSV hasil download (timpa yang lama)
      - name: Commit data terbaru
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jadwal.csv data/last_updated.txt
          # Hanya commit kalau ada perubahan
          git diff --staged --quiet || git commit -m "chore: sync jadwal $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
